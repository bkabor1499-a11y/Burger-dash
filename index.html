<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burger Dash</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>ðŸ”</text></svg>">
    <style>
        :root { --diner-red: #eb2f06; --diner-yellow: #f1c40f; --diner-cream: #ffffff; --sidebar-bg: #f7f1e3; --depth: rgba(0,0,0,0.2); }
        body { font-family: sans-serif; background-color: var(--diner-yellow); margin: 0; display: flex; flex-direction: column; min-height: 100vh; width: 100vw; overflow-x: hidden; }
        
        /* Layout adjust for mobile/landscape */
        @media (min-width: 600px) { body { flex-direction: row; } }

        #recipe-book { position: fixed; left: -320px; top: 0; width: 280px; height: 100vh; background: #fffdf2; border-right: 8px solid var(--diner-red); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 20px; z-index: 1000; box-shadow: 10px 0 30px rgba(0,0,0,0.3); display: flex; flex-direction: column; box-sizing: border-box; }
        #recipe-book.open { left: 0; }
        #menu-header { text-align: center; border-bottom: 4px double var(--diner-red); padding-bottom: 10px; margin-bottom: 15px; flex-shrink: 0; }
        #recipe-list { flex-grow: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 10px; font-family: 'Courier New', Courier, monospace; }
        
        #menu-open-btn { position: fixed; left: 10px; top: 10px; background: var(--diner-red); color: white; border: none; padding: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; z-index: 500; border-bottom: 4px solid #b33939; font-size: 12px; }

        .close-menu-btn { background: #2d3436; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        #main-kitchen { flex: 1; display: flex; flex-direction: column; padding: 10px; align-items: center; justify-content: center; min-height: 300px; }
        #game-shell { background: var(--diner-cream); border-radius: 20px; width: 95%; max-width: 400px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-bottom: 8px solid #ccc;}
        h1 { margin: 0 0 10px 0; font-size: 1.2em; color: var(--diner-red); text-align: center; text-transform: uppercase; }
        .header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .stat-box { background: var(--diner-red); color: white; padding: 5px 10px; border-radius: 10px; font-size: 0.9em; font-weight: bold; }
        
        #ticket { background: #fff9c4; border-left: 8px solid #f39c12; padding: 10px; margin-bottom: 10px; border-radius: 5px; font-size: 0.9em; text-align: center; }
        #patience-container { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 10px; overflow: hidden; }
        #patience-bar { width: 100%; height: 100%; background: #2ecc71; }

        #tray-area { display: flex; align-items: flex-end; justify-content: center; height: 150px; border-bottom: 10px solid #5d4037; background: #dfe6e9; border-radius: 10px; margin-bottom: 10px; }
        #burger-stack { display: flex; flex-direction: column-reverse; align-items: center; width: 100px; }
        
        #sidebar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; background: var(--sidebar-bg); }
        @media (min-width: 600px) { #sidebar { display: flex; flex-direction: column; width: 140px; } }
        
        .btn { padding: 10px 5px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7em; border-bottom: 3px solid rgba(0,0,0,0.2); }
        .ing { width: 90px; height: 15px; margin: 1px; font-size: 0.5em; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        
        #overlay, #pause-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; color: white; background: rgba(0,0,0,0.9); padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

<button id="menu-open-btn" onclick="toggleRecipes()">RECIPES</button>
<div id="recipe-book">
    <div id="menu-header"><h3 style="margin:0; color:var(--diner-red);">Cookbook</h3><small>Est. 2026</small></div>
    <div id="recipe-list"></div>
    <button class="close-menu-btn" onclick="toggleRecipes()">RESUME COOKING</button>
</div>

<div id="pause-overlay"><h1>PAUSED</h1><button class="btn" style="background:#2ecc71; color:white; padding:15px 40px; font-size:1.2em;" onclick="togglePause()">RESUME</button></div>

<div id="overlay">
    <h2 id="mini-title" style="color:var(--diner-yellow);"></h2>
    <div id="setup-controls" style="display:flex; flex-direction:column; gap:10px; width:220px;"></div>
    <div id="minigame-controls" style="display:none; text-align:center;">
        <div style="width:250px; height:40px; background:#222; border:3px solid #fff; position:relative; border-radius:10px; overflow:hidden; margin:20px auto;">
            <div id="target" style="position:absolute; height:100%; width:50px; background:#2ecc71; left:130px;"></div>
            <div id="needle" style="position:absolute; height:100%; width:8px; background:#fff; left:0;"></div>
        </div>
        <button class="btn" style="background:#2ecc71; color:white; width:100%; padding:20px;" onclick="checkHit()">PREPARE ITEM</button>
    </div>
    <button class="btn" style="background:#636e72; color:white; margin-top:25px;" onclick="closeOverlay()">CANCEL</button>
</div>

<div id="main-kitchen">
    <div id="game-shell">
        <h1>Burger Dash</h1>
        <div class="header"><div id="score-box" class="stat-box">$<span id="score">0.00</span></div><div class="stat-box"><span id="timer">60</span>s</div></div>
        <div id="patience-container"><div id="patience-bar"></div></div>
        <div id="ticket"><div id="order-text">Add bun to start!</div></div>
        <div id="tray-area"><div id="burger-stack"></div><div id="sides-tray"></div></div>
    </div>
</div>

<div id="sidebar">
    <button class="btn" style="background:#cd853f; color:white" onclick="add('bun')">Add Bun</button>
    <button class="btn" style="background:#4b2c20; color:white" onclick="add('patty')">Add Patty</button>
    <button class="btn" style="background:#f1c40f; color:#5d4037" onclick="add('cheese')">Add Cheese</button>
    <button class="btn" style="background:#8b0000; color:white" onclick="add('bacon')">Add Bacon</button>
    <button class="btn" style="background:#d63031; color:white" onclick="add('ketchup')">Ketchup</button>
    <button class="btn" style="background:#f9ca24; color:white" onclick="add('mustard')">Mustard</button>
    <button class="btn" style="background:#f5f6fa; color:#7f8c8d;" onclick="add('mayonnaise')">Mayo</button>
    <hr style="width:100%; border:0; border-top: 1px solid #ccc;">
    <button class="btn" style="background:#3498db; color:white" onclick="openSodaMenu()">Soda</button>
    <button class="btn" style="background:#a29bfe; color:white" onclick="openShakeMenu()">Shake</button>
    <button class="btn" style="background:#e67e22; color:white" onclick="openFryMenu()">Fries</button>
    <button class="btn" style="background:#95a5a6; color:white" onclick="togglePause()">Pause</button>
    <button class="btn" style="background:#2d3436; color:white" onclick="clearTray()">Trash</button>
    <button class="btn" style="background:#2ecc71; color:white; padding:15px 0;" onclick="serve()">SERVE!</button>
</div>
<script>
    const recipes = { 
        "hamburger": ["bun", "patty", "bun"], 
        "cheeseburger": ["bun", "patty", "cheese", "bun"], 
        "bacon cheeseburger": ["bun", "patty", "cheese", "bacon", "bun"], 
        "double hamburger": ["bun", "patty", "patty", "bun"], 
        "double cheeseburger": ["bun", "patty", "cheese", "patty", "cheese", "bun"], 
        "double bacon cheeseburger": ["bun", "patty", "cheese", "bacon", "patty", "cheese", "bacon", "bun"] 
    };
    const priceList = { "hamburger": 7.50, "cheeseburger": 8.50, "bacon cheeseburger": 10.50, "double hamburger": 9.50, "double cheeseburger": 11.50, "double bacon cheeseburger": 14.00 };
    const sodas = ["Oranger Juice", "Colly Cola", "Spirit", "Sugar Tea"];
    const milkshakes = ["Vanilla", "Chocolate", "Cookies and Cream", "Birthday Cake"]; 
    const sizes = ["Small", "Large"], condimentsList = ["ketchup", "mustard", "mayonnaise"];
    
    let currentOrder = null, build = [], score = 0, timeLeft = 60, timerInterval, isMiniRunning = false, isPaused = false, needlePos = 0, needleSpeed = 6, pendingItem = "", orderPatience = 100, patienceInterval;

    function toggleRecipes() { document.getElementById('recipe-book').classList.toggle('open'); }
    function togglePause() { if(!currentOrder) return; isPaused = !isPaused; document.getElementById('pause-overlay').style.display = isPaused ? 'flex' : 'none'; }
    
    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timeLeft = 60; 
        document.getElementById('timer').innerText = timeLeft;
        timerInterval = setInterval(() => {
            if (!isMiniRunning && !isPaused && currentOrder) {
                timeLeft--; 
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) { 
                    clearInterval(timerInterval); 
                    alert("GAME OVER! Cash: $" + score.toFixed(2)); 
                    location.reload(); 
                }
            }
        }, 1000);
    }

    function startPatience() {
        if(patienceInterval) clearInterval(patienceInterval);
        orderPatience = 100;
        patienceInterval = setInterval(() => {
            if (!isPaused && !isMiniRunning && currentOrder) {
                if(orderPatience > 0) {
                    orderPatience -= 0.3;
                    document.getElementById('patience-bar').style.width = orderPatience + "%";
                }
            }
        }, 100);
    }

    function updateOrderDisplay() {
        if (!currentOrder) return;
        document.getElementById('order-text').innerHTML = `<strong>${currentOrder.base.toUpperCase()}</strong><br><small>${currentOrder.conds.join(', ') || 'Plain'}</small><br><span style="color:var(--diner-red); font-weight:bold;">${currentOrder.sides.join(' & ') || ''}</span>`;
    }

    function nextOrder() {
        const rKeys = Object.keys(recipes);
        const base = rKeys[Math.floor(Math.random() * rKeys.length)];
        const s = []; const c = [];
        condimentsList.forEach(item => { if(Math.random() < 0.5) c.push(item); });
        if (Math.random() > 0.4) {
            const sz = sizes[Math.floor(Math.random() * 2)];
            if (Math.random() > 0.5) s.push(sodas[Math.floor(Math.random() * sodas.length)] + " (" + sz + ")");
            else s.push(milkshakes[Math.floor(Math.random() * milkshakes.length)] + " Shake (" + sz + ")");
        }
        if (Math.random() > 0.6) s.push("Fries (" + sizes[Math.floor(Math.random() * 2)] + ")");
        currentOrder = { base, sides: s, conds: c };
        updateOrderDisplay();
        document.getElementById('patience-bar').style.background = "#2ecc71";
        startTimer(); startPatience();
    }

    function add(ing) { 
        if (!currentOrder || isPaused) { 
            if (!currentOrder) nextOrder(); 
            return; 
        } 
        
        // Prevent adding ingredients if the burger is already closed with a second bun
        const hasTopBun = build.filter(i => i === 'bun').length >= 2;
        if (hasTopBun && ing !== 'bun') {
            return;
        }

        build.push(ing); 
        render(); 
    }

    function openSodaMenu() { if(!currentOrder || isPaused) return; showOverlay("SODA FOUNTAIN", sodas.map((s, i) => `<button class="btn" onclick="selectSize('${s}', 'Soda')">${s}</button>`).join('')); }
    function openShakeMenu() { if(!currentOrder || isPaused) return; showOverlay("SHAKE MIXER", milkshakes.map((m, i) => `<button class="btn" onclick="selectSize('${m} Shake', 'Shake')">${m}</button>`).join('')); }
    function selectSize(item, type) { showOverlay("SIZE", sizes.map((sz, i) => `<button class="btn" onclick="validateSide('${item} (${sz})', '${type}')">${sz}</button>`).join('')); }
    function openFryMenu() { if(!currentOrder || isPaused) return; showOverlay("FRYER", sizes.map((sz, i) => `<button class="btn" onclick="validateSide('Fries (${sz})', 'Fries')">${sz}</button>`).join('')); }
    function showOverlay(title, content) { document.getElementById('overlay').style.display = 'flex'; document.getElementById('mini-title').innerText = title; document.getElementById('setup-controls').innerHTML = content; }
    
    function validateSide(sel, type) {
        pendingItem = sel; document.getElementById('setup-controls').innerHTML = ""; document.getElementById('minigame-controls').style.display = 'block'; isMiniRunning = true; needlePos = 0; loop();
    }

    function loop() { if(!isMiniRunning) return; needlePos += needleSpeed; if(needlePos > 242 || needlePos < 0) needleSpeed *= -1; document.getElementById('needle').style.left = needlePos + "px"; requestAnimationFrame(loop); }
    function checkHit() { if (needlePos >= 130 && needlePos <= 185) { build.push(pendingItem); render(); closeOverlay(); } else { alert("Missed!"); closeOverlay(); } }
    function closeOverlay() { isMiniRunning = false; document.getElementById('overlay').style.display = 'none'; document.getElementById('minigame-controls').style.display = 'none'; }

    function render() {
        const b = document.getElementById('burger-stack'), s = document.getElementById('sides-tray'); b.innerHTML = ''; s.innerHTML = '';
        build.forEach(ing => {
            const isS = sodas.some(x => ing.includes(x)), isSh = ing.includes("Shake"), isF = ing.includes("Fries"), d = document.createElement('div'), szCls = ing.includes("Small") ? "size-Small" : "size-Large";
            if (isS) { d.className = `soda-cup color-${ing.split(' ')[0]} ${szCls}`; s.appendChild(d); }
            else if (isSh) { d.className = `shake-cup color-${ing.split(' ')[0]} ${szCls}`; d.innerHTML = `<div class="whipped"></div>`; s.appendChild(d); }
            else if (isF) { 
                d.className = `fry-carton ${ing.includes("Large") ? 'fry-Large' : 'fry-Small'}`; 
                for(let i=0; i<5; i++) {
                    let stick = document.createElement('div'); stick.className = 'fry-stick';
                    stick.style.left = (i * 8) + 'px'; stick.style.top = (Math.random() * 5) + 'px'; d.appendChild(stick);
                }
                s.appendChild(d); 
            }
            else { d.className = `ing ${ing}`; d.innerText = ing; b.appendChild(d); }
        });
    }

    function clearTray() { build = []; render(); }

    function isCorrect() {
        if (!currentOrder) return false;
        const burgerNeeded = recipes[currentOrder.base];
        const burgerBuild = build.filter(i => ["bun", "patty", "cheese", "bacon"].includes(i));
        if (JSON.stringify(burgerBuild) !== JSON.stringify(burgerNeeded)) return false;
        
        const condsBuild = build.filter(i => condimentsList.includes(i)).sort();
        const condsNeeded = [...currentOrder.conds].sort();
        if (JSON.stringify(condsBuild) !== JSON.stringify(condsNeeded)) return false;

        const sidesBuild = build.filter(i => !["bun", "patty", "cheese", "bacon", ...condimentsList].includes(i)).sort();
        const sidesNeeded = [...currentOrder.sides].sort();
        if (JSON.stringify(sidesBuild) !== JSON.stringify(sidesNeeded)) return false;

        return true;
    }

    function serve() {
        if(!currentOrder || isPaused) return;
        const ticketText = document.getElementById('order-text');

        if (isCorrect()) {
            let basePrice = priceList[currentOrder.base] || 5.00;
            let tip = 0;

            if (timeLeft > 30) {
                let bonusAmount = Math.floor((timeLeft - 30) / 5);
                let chanceThreshold = 0.3 + (Math.random() * 0.4); 
                if (Math.random() < chanceThreshold) {
                    tip = bonusAmount;
                }
            }

            score += (basePrice + tip);
            document.getElementById('score').innerText = score.toFixed(2);
            
            if (tip > 0) {
                ticketText.innerHTML = `<span style='color:#2ecc71; font-weight:bold;'>ORDER UP! + $${tip.toFixed(2)} TIP</span>`;
            } else {
                ticketText.innerHTML = `<span style='color:#2ecc71; font-weight:bold;'>ORDER UP!</span>`;
            }

            setTimeout(() => {
                clearTray(); 
                nextOrder();
            }, 800);
        } else {
            ticketText.innerHTML = "<span style='color:red; font-weight:bold; font-size:1.4em;'>WRONG!</span>";
            orderPatience -= 10;
            setTimeout(() => {
                updateOrderDisplay();
            }, 1000);
        }
    }

    function updateMenuDisplay() { 
        let html = "";
        for(let key in recipes) {
            html += `<div class="recipe-entry">
                  <span class="recipe-name">${key}</span>
                <span class="recipe-ings">${recipes[key].join(" â†’ ")}</span>
            </div>`;
        }
        document.getElementById('recipe-list').innerHTML = html;
    }
    updateMenuDisplay();
</script>
</body>
  </html>
